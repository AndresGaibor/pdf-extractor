name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Ruff + Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Pytest
        run: uv run pytest

  build-windows:
    name: Build Windows artifact
    runs-on: windows-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Build app with PyInstaller
        run: uv run --with pyinstaller python scripts/build_pyinstaller.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: extractor-pdf-windows-${{ github.run_number }}
          path: dist/extractor-pdf/**
