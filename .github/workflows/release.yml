name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release Windows artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Pytest
        run: uv run pytest

      - name: Sync runtime dependencies
        run: uv sync --locked

      - name: Build app with PyInstaller
        run: uv run --with pyinstaller python scripts/build_pyinstaller.py

      - name: Zip build output
        shell: pwsh
        run: Compress-Archive -Path dist/extractor-pdf/* -DestinationPath dist/extractor-pdf-${{ github.ref_name }}.zip -Force

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "dist/extractor-pdf-${{ github.ref_name }}.zip" \
            --title "${{ github.ref_name }}" \
            --generate-notes
